# Seed "Mercuria" — agente MESSAGGERO della colonia (hub comunicazioni).
# Auto-istanziata (agents-seed/): agente dedicato a email e Telegram (in
# prospettiva anche WhatsApp). Le comunicazioni trasportano documenti e
# informazioni provenienti da più topic → clearance minima SEAL-2.
# NB: distinta da Eco (agent-templates/eco), il responder-nel-canale confinato
# per-topic e senza portata esterna.
# Roadmap: in futuro un'istanza di Mercuria per topic svolgerà le funzioni di
# messaggero locale; per ora è un'unica istanza con i tool comms a disposizione.
name: mercuria
display_name: Mercuria
description: "Agente messaggero: email e Telegram per conto della colonia. Clearance SEAL-2 (le comunicazioni attraversano documenti di più topic)."
type: normal
clearance: SEAL-2
constitution: platform-core
agent_sdk: claude
model: claude-sonnet-4-5
# Provider: SOLO SEAL≥2 (= clearance di Mercuria). Le comunicazioni trasportano
# documenti cross-topic fino a SEAL-2: NON deve ripiegare su provider SEAL-1
# (claude-pro-max/anthropic-api = US-residency). aws-region-eu (Bedrock EU) è
# l'unico provider SEAL-2 che serve Claude → nessun fallback SEAL-1 by design
# (se Bedrock EU è giù, Mercuria resta disabilitata anziché usare un provider inadeguato).
providers: [aws-region-eu]
avatar_color: "#0ea5e9"
sandbox:
  allow_read: ["{scratch}/**"]
  deny_read: ["secrets/**"]
  allow_write: ["{scratch}/**"]
  allow_shell_cmds: []
  deny_shell_patterns: ["*"]
capabilities: []
rules: []
# Tool comms (la fruizione degli account/token resta gated dai grant del vault:
# email account + telegram_bot_token delegati a Mercuria dalla sezione
# Connettori/Integrations). Enforcement effettivo nel gateway (config.yaml).
tool_permissions: [email.*, telegram.*]
memory:
  dir: memory/
system_prompt: system-prompt.md

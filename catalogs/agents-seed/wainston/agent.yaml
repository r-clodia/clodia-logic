name: wainston
display_name: Wainston
description: "Agent dedicato al widget di assistenza in-app: risolve attriti operativi nella WebUI, gestisce variabili app non sensibili e scala a Clodia quando serve."
type: normal
# Immutabile a runtime: Wainston è agent di sistema. Come i super, si modifica
# solo via codice/rebuild del seed (no PATCH/PFP/agents.*). Vedi _is_immutable.
immutable: true
# Helpdesk del widget = canale "Internal" (SEAL-1): serve la clearance per poter
# rispondere lì (senza, il default SEAL-0 lo escluderebbe da _pick_responder).
clearance: SEAL-1
constitution: platform-core
parents: [clodia]
created_at: "2026-06-28T00:00:00Z"
agent_sdk: claude
model: claude-sonnet-4-5
# Provider in ordine di preferenza (primo attivo vince): Wainston preferisce
# l'abbonamento Pro/Max (costo flat) per il widget di assistenza, fallback API.
providers: [claude-pro-max, anthropic-api]
avatar_color: "#38bdf8"
mailbox_parent: clodia

sandbox:
  allow_read: ["{scratch}/**", "agents/**"]
  deny_read: ["topics/confidential/**", "secrets/**"]
  allow_write: ["{scratch}/**"]
  allow_shell_cmds: []
  deny_shell_patterns: ["*"]

capabilities:
  - "helpdesk"
rules: []
tool_permissions:
  - "app_runtime.get"
  - "app_runtime.set"
  - "app_runtime.list"
  - "app_runtime.reset"
  - "app_runtime.health"
  # amministrazione capability degli ALTRI agent editabili (skill/tool/rules).
  - "agents.*"
priority: 20
cost_profile: standard

memory:
  dir: memory/

system_prompt: system-prompt.md

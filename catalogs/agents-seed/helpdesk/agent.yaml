name: helpdesk
display_name: Helpdesk
description: "Agent dedicato al widget di assistenza in-app: orienta l'utente nella WebUI, fa triage dei problemi e scala a Clodia quando serve."
type: normal
constitution: platform-core
parents: [clodia]
created_at: "2026-06-28T00:00:00Z"
agent_sdk: claude
model: claude-sonnet-4-5
avatar_color: "#38bdf8"
mailbox_parent: clodia

sandbox:
  allow_read: ["{scratch}/**", "agents/**"]
  deny_read: ["topics/confidential/**", "secrets/**"]
  allow_write: ["{scratch}/**"]
  allow_shell_cmds: []
  deny_shell_patterns: ["*"]

capabilities:
  - "helpdesk/in-app-support"
  - "helpdesk/ui-navigation"
  - "helpdesk/triage"
  - "helpdesk/escalation"
rules: []
tool_permissions: []
priority: 20
cost_profile: standard

memory:
  dir: memory/

system_prompt: system-prompt.md

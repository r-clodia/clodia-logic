name: sysadmin
display_name: Sysadmin
description: "Sysadmin di piattaforma (platform ops): osserva l'attività degli agenti, osserva e propone job (approvazione owner), controlla le run dei workflow, importa/rimuove pack e ne installa le dipendenze nel gateway, osserva lo stato delle integration, aggiunge MCP server, mette in pausa/riattiva i provider, gestisce i settings. Change management e log su ogni azione. NON entra nei topic e non tratta mai dati confidenziali."
type: normal
# Immutabile a runtime: agent di sistema, si modifica solo via seed/rebuild.
immutable: true
# Clearance minima interna: SEAL-1. Sotto la soglia del confidenziale (SEAL-2+):
# per costruzione non può accedere a dati confidenziali. Nessun canale utente.
clearance: SEAL-1
constitution: platform-core
parents: [clodia]
created_at: "2026-07-07T00:00:00Z"
agent_sdk: claude
model: claude-sonnet-5
providers: [claude-team, claude-pro-max, anthropic-api, aws-region-eu]
avatar_color: "#f59e0b"
mailbox_parent: clodia

# Il mestiere di Sysadmin è l'operatività di piattaforma via tool gated + shell in
# path persistenti della datadir (plugins/, runtime/). CONFINI HARD, non negoziabili:
#   • NIENTE topics: non legge né scrive in topics/, e non ha i tool runtime.topics /
#     runtime.chats (che esporrebbero conversazioni utente).
#   • NIENTE confidenziale: clearance SEAL-1 < soglia SEAL-2; nessun dato utente fuori
#     dai datastore dichiarati dai pack.
#   • NIENTE segreti: no secrets/, no vault, no keystore provider (pause/resume di un
#     provider NON espone la chiave).
# LETTURA CODICE PLATFORM (per capire dove intervenire): `/clodia` è il repo
# clodia-logic (core, già nel container), `/platform-src/**` i sorgenti degli
# altri repo montati read-only (clodia-tools/web/pwa). Sola lettura; i segreti
# (secrets/, .env, vault) restano esclusi con precedenza sul deny.
sandbox:
  allow_read: ["{scratch}/**", "plugins/**", "packs/**", "runtime/**", "agents/**",
               "/clodia/**", "/platform-src/**"]
  deny_read: ["topics/**", "secrets/**", "clodia-vault/**",
              "/clodia/secrets/**", "/clodia/**/.env*", "/clodia/**/*.key",
              "/platform-src/**/secrets/**", "/platform-src/**/.env*", "/platform-src/**/*.key"]
  allow_write: ["{scratch}/**", "plugins/**", "runtime/**"]
  allow_shell_cmds: ["*"]
  deny_shell_patterns: []

capabilities:
  - "base-pack/*"
rules: []
tool_permissions:
  # ── Osservazione (read-only). ESCLUSI di proposito runtime.topics e runtime.chats:
  #    sysadmin non entra nei topic né legge conversazioni utente. ──
  - "runtime.agents"          # attività/stato degli agenti
  - "runtime.jobs"            # stato dei job
  - "runtime.providers"       # stato dei provider (no segreti)
  - "runtime.mcp_servers"     # MCP server registrati e loro stato
  - "runtime.skills"          # skill materializzate
  # ── Jobs: osserva + PROPONE (gate owner). Nessun create/delete diretto: anche
  #    sysadmin passa dall'approvazione dell'owner per i job. ──
  - "jobs.list"
  - "jobs.propose"
  # ── Pack ops: import / remove + install dipendenze dichiarate (requires:) ──
  - "packs.*"
  # ── Workflows: start / stop / terminate delle run ──
  - "workflows.*"
  # ── Integrations: osserva stato/connessione (no lettura dei dati veicolati) ──
  - "integrations.list"
  # ── MCP servers: aggiungi/registra ──
  - "mcp.add"
  - "mcp.list"
  # ── Providers: pausa / riattiva (no accesso alle chiavi) ──
  - "providers.list"
  - "providers.pause"
  - "providers.resume"
  # ── Settings di piattaforma + backup pre-flight per le migrazioni ──
  - "settings.*"
  - "fs.list_dir"
priority: 30
cost_profile: standard

memory:
  dir: memory/

system_prompt: system-prompt.md

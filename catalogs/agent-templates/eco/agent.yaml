# Archetipo "Eco" — responder confinato di un canale (Telegram).
# NON auto-istanziato (sta in agent-templates/, non in agents-seed/): la
# piattaforma ne CLONA un'identità confinata per ogni topic-con-channel
# (name→eco-<topic>, clearance→tier del topic, participant SOLO di quel topic).
# Vedi api/channel_responder.py e project_topic_access_two_axis.
# NB: distinto da Messaggero (agents-seed/messaggero), l'agente messaggero con i
# tool email/telegram; Eco è il responder-nel-canale senza portata esterna.
name: eco
display_name: Eco
description: "Responder confinato di un canale Telegram. Non super, nessun tool esterno: privacy shield (spec 3bis)."
type: normal
clearance: SEAL-1
constitution: platform-core
agent_sdk: claude
model: claude-sonnet-4-5
providers: [claude-pro-max, anthropic-api]
avatar_color: "#8b5cf6"
sandbox:
  allow_read: ["{scratch}/**"]
  deny_read: ["secrets/**", "topics/**"]
  allow_write: ["{scratch}/**"]
  allow_shell_cmds: []
  deny_shell_patterns: ["*"]
capabilities: []
rules: []
tool_permissions: []
memory:
  dir: memory/
system_prompt: system-prompt.md

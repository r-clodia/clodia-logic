name: base-pack
description: >-
  Pack di base della piattaforma Clodia (first-party, sempre presente): le skill
  e rule native + gli agent seed di sistema (clodia, ophelia, messaggero,
  janitor, sysadmin, segretario). A differenza dei pack di terze parti è trusted per
  costruzione: non passa dal security-review gate e non è disinstallabile.
version: 6.4.1
license: AGPL-3.0-or-later
first_party: true
# Sorgente per Check update / Update (Opzione A): il pack si aggiorna dal suo
# repo GitHub. base-pack vive nel motore (clodia-logic, pubblico); i pack di
# clodia-packs dichiarano repo=r-clodia/clodia-packs path=packs/<nome>.
upstream:
  repo: r-clodia/clodia-logic
  path: catalogs/packs/base-pack
  ref: main
# Elenco esplicito (oltre alla scoperta dalle dir agents/plugins): serve al
# manifest registrato in datadir/packs così la view Packs mostra il contenuto
# anche prima di un (re)install. install_pack_from_root li ri-scopre comunque.
agents:
  - clodia
  - ophelia
  - messaggero
  - janitor
  - sysadmin
  - segretario
plugins:
  - base-pack

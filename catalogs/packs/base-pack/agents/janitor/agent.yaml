name: janitor
display_name: Janitor
description: "Guida della WebUI: conosce a fondo la piattaforma e porta l'utente alla sezione/pagina giusta, fa triage degli attriti operativi e scala a Clodia per azioni amministrative. Nessun potere di amministrazione."
type: normal
# Immutabile a runtime: Janitor è agent di sistema. Come i super, si modifica
# solo via codice/rebuild del seed (no PATCH/PFP/agents.*). Vedi _is_immutable.
immutable: true
# Helpdesk del widget = canale "Internal" (SEAL-1): serve la clearance per poter
# rispondere lì (senza, il default SEAL-0 lo escluderebbe da _pick_responder).
clearance: SEAL-1
constitution: platform-core
parents: [clodia]
created_at: "2026-06-28T00:00:00Z"
agent_sdk: claude
model: claude-sonnet-4-5
# Provider in ordine di preferenza (primo attivo vince): Janitor preferisce
# l'abbonamento Pro/Max (costo flat) per il widget di assistenza, fallback API.
providers: [claude-team, claude-pro-max, anthropic-api]
avatar_color: "#38bdf8"
mailbox_parent: clodia

sandbox:
  allow_read: ["{scratch}/**", "agents/**"]
  deny_read: ["topics/confidential/**", "secrets/**"]
  allow_write: ["{scratch}/**"]
  allow_shell_cmds: []
  deny_shell_patterns: ["*"]

capabilities:
  - "helpdesk"
rules: []
tool_permissions:
  # SOLO read-only: Janitor guida, non amministra. Rimossi app_runtime.set/reset
  # (scrittura variabili app) e agents.* (amministrazione capability di altri
  # agent) — erano la sovrapposizione con Sysadmin. Ogni azione che cambia stato
  # → si scala a Clodia/owner.
  - "app_runtime.get"
  - "app_runtime.list"
  - "app_runtime.health"
priority: 20
cost_profile: standard

memory:
  dir: memory/

system_prompt: system-prompt.md

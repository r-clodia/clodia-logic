name: sysadmin
display_name: Sysadmin
description: "Steward della piattaforma (guida WebUI + platform-ops): è l'agente del widget di assistenza — guida l'utente alla pagina giusta (marker goto), fa triage, guida il setup delle integrazioni — E amministra la piattaforma: pack (import/remove + dipendenze + setup), agent (capability grant/revoke), job, workflow, provider, integration, settings, runtime (backup, migrazioni dati, restart agente impuntato, lettura codice/log). A differenza del vecchio Janitor NON scala le azioni: le esegue, con quasi tutte le mutazioni GATED (approvazione umana in contesto, M-gate). CONFINI HARD: clearance SEAL-1 (mai dati confidenziali), accede ai FILE dei topic con le regole comuni (participant + clearance, via topic.*; cross-topic → gate) e li ispeziona dal widget entro clearance (runtime.inspect_topic), nessun segreto. (Consolida janitor + sysadmin.)"
type: normal
# Immutabile a runtime: agent di sistema, si modifica solo via seed/rebuild.
immutable: true
# Clearance minima interna: SEAL-1. Sotto la soglia del confidenziale (SEAL-2+):
# per costruzione non può accedere a dati confidenziali. Nessun canale utente.
clearance: SEAL-1
constitution: platform-core
parents: [clodia]
created_at: "2026-07-07T00:00:00Z"
agent_sdk: claude
model: claude-sonnet-5
providers: [claude-team, claude-pro-max, anthropic-api, aws-region-eu]
avatar_color: "#f59e0b"
mailbox_parent: clodia

# Il mestiere di Sysadmin è l'operatività di piattaforma via tool gated + shell in
# path persistenti della datadir (plugins/, runtime/). CONFINI HARD, non negoziabili:
#   • TOPIC — STESSE REGOLE DEGLI ALTRI AGENT (participant + clearance):
#     - FILE dei topic: legge/scrive via i tool `topic.*` (list_files/read_file/
#       put_file/delete_file/…) come qualunque worker. L'accesso è enforced dal
#       gateway: dev'essere PARTICIPANT del topic e avere clearance ≥ tier; su un
#       topic di cui NON è participant scatta il gate cross-topic (approvazione
#       owner). Nessun accesso RAW-FS ai topic (deny_read topics/**): come per
#       messaggero, il canale ai file sono i TOOL, non il filesystem.
#     - Ispezione dal widget: `runtime.inspect_topic` (metadati + agenti + ultimi
#       messaggi) anche da NON-participant, ma solo entro la clearance (SEAL < tier
#       → 403). I confidenziali sopra la sua SEAL restano invisibili.
#     - `topic.post_message` resta prerogativa di super/messaggero (non di sysadmin).
#   • NIENTE confidenziale: clearance SEAL-1 < soglia SEAL-2; nessun dato utente fuori
#     dai datastore dichiarati dai pack.
#   • NIENTE segreti: no secrets/, no vault, no keystore provider (pause/resume di un
#     provider NON espone la chiave).
# LETTURA CODICE PLATFORM (per capire dove intervenire): `/clodia` è il repo
# clodia-logic (core, già nel container), `/platform-src/**` i sorgenti degli
# altri repo montati read-only (clodia-tools/web/pwa). Sola lettura; i segreti
# (secrets/, .env, vault) restano esclusi con precedenza sul deny.
sandbox:
  allow_read: ["{scratch}/**", "plugins/**", "packs/**", "runtime/**", "agents/**",
               "/clodia/**", "/platform-src/**"]
  deny_read: ["topics/**", "secrets/**", "clodia-vault/**",
              "/clodia/secrets/**", "/clodia/**/.env*", "/clodia/**/*.key",
              "/platform-src/**/secrets/**", "/platform-src/**/.env*", "/platform-src/**/*.key"]
  allow_write: ["{scratch}/**", "plugins/**", "runtime/**"]
  allow_shell_cmds: ["*"]
  deny_shell_patterns: []

capabilities:
  - "base-pack/*"
  - "helpdesk"          # è l'agente del widget di assistenza (canale SEAL-1 helpdesk)
rules: []
tool_permissions:
  # Remit PLATFORM-OPS pieno (lug 2026): sysadmin amministra la piattaforma su
  # tutti i namespace operativi. NB: quasi tutte le MUTAZIONI qui sotto sono
  # verbi GATED (M-gate) → ogni uso richiede comunque l'approvazione umana in
  # contesto; il grant apre la superficie, il gate resta il controllo a runtime.
  # I CONFINI HARD restano: SEAL-1 (mai confidenziale, per clearance), nessun
  # segreto. I FILE dei topic NON sono più vietati in assoluto: accesso via
  # topic.* con le regole comuni (participant + clearance + gate cross-topic).
  - "agents.*"          # capability degli altri agent (grant/revoke, gated) + list/show
  - "integrations.*"    # osservazione/test dei connettori
  - "jobs.*"            # job schedulati (propose gated by design)
  - "packs.*"           # import/remove pack + install dipendenze (requires:)
  - "profile.*"         # profili/stile
  - "providers.*"       # pausa/ripresa provider di inferenza (gated) + list
  - "runtime.*"         # introspezione runtime + restart_agent (include topics/chats: solo METADATI, non il contenuto)
  - "settings.*"        # settings di piattaforma (backup run/set/get/restore-test, gated)
  - "workflows.*"       # lifecycle delle run dei workflow (start/cancel/delete_run, gated) + list/status
  - "fs.list_dir"       # navigazione datadir (plugins/, runtime/)
  - "logs.tail"         # diagnosi: ultimi log del server (read-only)
  # ── Front-of-house (ex janitor): lettura stato UI non sensibile per guidare ──
  - "app_runtime.get"
  - "app_runtime.list"
  - "app_runtime.health"
  # ── File dei topic: stesse regole degli altri agent (es. messaggero) ──
  # list/read/put/delete file, open, summary/minute. Enforcement gateway:
  # participant + clearance ≥ tier; topic non-participant → gate cross-topic.
  # post_message resta bloccato (prerogativa super/messaggero) dal suo guard.
  - "topic.*"
priority: 30
cost_profile: standard

memory:
  dir: memory/

system_prompt: system-prompt.md

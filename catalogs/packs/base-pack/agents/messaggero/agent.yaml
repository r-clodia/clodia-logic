# Seed "Messaggero" — agente MESSAGGERO della colonia (hub comunicazioni).
# Auto-istanziata (agents-seed/): agente dedicato a email e Telegram (in
# prospettiva anche WhatsApp). Le comunicazioni trasportano documenti e
# informazioni provenienti da più topic → clearance minima SEAL-2.
# Modello telegram-proxy (18 lug): il messaggero è l'UNICA superficie esposta a
# Telegram. Inbound = relay meccanico server-side (ripete verbatim nel topic con
# handle autenticato; il messaggero non esegue/risponde); outbound = telegram.send
# esclusivo, su delega degli agenti. Seed multi-istanza: il binding è per-istanza
# (messaggero-#N ↔ set di chat_id via telegram.listen), non per-topic.
name: messaggero
display_name: Messaggero
description: "Agente messaggero: email e Telegram per conto della colonia. Clearance SEAL-2 (le comunicazioni attraversano documenti di più topic)."
type: normal
clearance: SEAL-2
constitution: platform-core
# Runtime segue il provider effettivo: scaleway→opencode, aws-region-eu→claude.
# agent_sdk è il default/fallback quando nessun provider risolve.
agent_sdk: opencode
# Messaggero è un dispacciatore: non serve ragionamento pesante, basta affidabilità
# nel tool-use. Primario: gpt-oss-120b (open, sovrano) su scaleway via OpenCode.
model: gpt-oss-120b
# Provider: SOLO SEAL≥2 (= clearance di Messaggero); le comunicazioni trasportano
# documenti cross-topic fino a SEAL-2, mai su provider SEAL-1. Catena di fallback
# cross-SDK: scaleway (SEAL-3, gpt-oss via OpenCode) → aws-region-eu (SEAL-2,
# haiku via Bedrock/claude, override in provider_models). Nessun SEAL-1.
providers: [scaleway, aws-region-eu]
provider_models: {aws-region-eu: claude-haiku-4-5}
avatar_color: "#0ea5e9"
sandbox:
  allow_read: ["{scratch}/**"]
  deny_read: ["secrets/**"]
  allow_write: ["{scratch}/**"]
  allow_shell_cmds: []
  deny_shell_patterns: ["*"]
# Skill base-pack mirata: riconciliazione inbound email → topic (job-driven,
# ledger nella seed memory). Vedi skill email-reconcile.
capabilities: [base-pack/email-reconcile]
rules: []
# Tool comms (la fruizione degli account/token resta gated dai grant del vault:
# email account + telegram_bot_token delegati a Messaggero dalla sezione
# Connettori/Integrations). Enforcement effettivo nel gateway (config.yaml).
tool_permissions: [email.*, telegram.*, topic.*]
memory:
  dir: memory/
system_prompt: system-prompt.md

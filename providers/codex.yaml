# Provider Codex / ChatGPT (abbonamento OpenAI) — pezzo di sistema CLONABILE.
# Solo DEFINIZIONE (catalogo), MAI credenziali (→ vault del gateway). Il flusso
# OAuth (codex login su auth.openai.com → bundle auth.json) è in
# server/api/openai_oauth.py (campo `flow`). DPA consumer: NON adatto di default
# ai dati confidenziali. Costo fisso da abbonamento ChatGPT.
name: Codex / ChatGPT
mechanism: subscription
sdk: codex
flow: openai
priority: 20
models: ["gpt-*", "o1*", "o3*", "o4*", "codex*"]

# ── Sovranità (EC Cloud Sovereignty Framework v1.2.1) — SEAL eff = min(SOV-2/3/7)
sovereignty:
  seal: SEAL-1
  assessment: { SOV-2: SEAL-1, SOV-3: SEAL-0, SOV-7: SEAL-1 }
  dimensions:
    jurisdiction: us
    dpa: false                  # ChatGPT/codex consumer: nessun DPA
    dpa_url: "https://openai.com/policies/privacy-policy"
    no_training: default
    data_residency: us
    retention: standard
    cloud_act_exposed: true
  note: "Abbonamento consumer OpenAI: come claude-pro-max, non adatto a dati riservati di default."

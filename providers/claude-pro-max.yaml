# Provider Claude Pro/Max (abbonamento) — pezzo di sistema CLONABILE.
# Solo DEFINIZIONE (catalogo), MAI credenziali (→ vault del gateway). Il flusso
# OAuth+PKCE (login su claude.ai) è in server/api/anthropic_oauth.py (campo `flow`).
# DPA consumer (possibili termini di training): NON adatto di default ai dati
# confidenziali. Costo fisso da abbonamento, niente consumo API.
name: Claude Pro/Max
# Meccanismo: login-abbonamento OAuth+PKCE → CLAUDE_CODE_OAUTH_TOKEN.
mechanism: subscription
sdk: claude
flow: anthropic
# Preferito dopo l'API per lo stesso SDK.
priority: 20

# ── Sovranità (EC Cloud Sovereignty Framework v1.2.1) — SEAL eff = min(SOV-2/3/7)
sovereignty:
  seal: SEAL-1
  assessment: { SOV-2: SEAL-1, SOV-3: SEAL-0, SOV-7: SEAL-1 }
  dimensions:
    jurisdiction: us
    dpa: false                  # consumer: nessun DPA art. 28
    dpa_url: "https://www.anthropic.com/legal/consumer-terms"
    no_training: default        # termini consumer (più deboli del commerciale)
    data_residency: us
    retention: standard
    cloud_act_exposed: true
  note: "Abbonamento consumer: niente DPA, controlli dato deboli (SOV-3=SEAL-0). NON adatto a dati con riservatezza; preferire l'API."
